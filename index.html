<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Golden Ratio Animation</title>
        <!-- Google Fonts の読み込み -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=EB+Garamond:wght@400;600&family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <!-- p5.jsの読み込み -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
        <!-- Tweakpaneの読み込み (UIツールウィンドウ用) -->
        <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.10/dist/tweakpane.min.js"></script>
        <link rel="stylesheet" type="text/css" href="style.css" />
    </head>
    <body>
        <div id="recording-indicator" style="display: none">
            <div class="record-dot"></div>
            <span id="recording-time">00:00</span>
        </div>

        <button
            id="ui-toggle-button"
            title="Toggle Tool Window (UIの表示/非表示を切り替えます)"
        >
            Toggle UI
        </button>

        <div id="tp-container"></div>

        <script type="module" src="main.js"></script>
    </body>
</html>
